<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g id="icon">
    <!-- Prism triangle -->
    <polygon points="100,30 45,150 155,150" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
    <!-- Incoming light ray -->
    <line x1="20" y1="90" x2="72" y2="90" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
    <!-- Refracted rays exiting right -->
    <line x1="128" y1="80" x2="175" y2="55" stroke="#0891b2" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <line x1="132" y1="95" x2="180" y2="90" stroke="#0e7490" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="130" y1="110" x2="178" y2="120" stroke="#0891b2" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="125" y1="125" x2="170" y2="148" stroke="#0e7490" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Inner glow at refraction point -->
    <circle cx="100" cy="95" r="8" fill="#0891b2" opacity="0.25"/>
  </g>
  <g id="wordmark">
    <text x="100" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="22" fill="#0f172a" letter-spacing="-0.5">HypeTest</text>
  </g>
</svg>
