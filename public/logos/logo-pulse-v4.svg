<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Pulse-in-speech-bubble — signal emerging from a conversation/research context -->
  <g id="icon">
    <!-- Speech bubble shape -->
    <path
      d="M30,40 Q30,25 45,25 L155,25 Q170,25 170,40 L170,120 Q170,135 155,135 L85,135 L60,162 L65,135 L45,135 Q30,135 30,120 Z"
      fill="#0f172a"
    />
    <!-- Waveform inside the bubble -->
    <path
      d="M48,85 L62,85 L70,55 L82,110 L94,38 L106,95 L115,65 L125,85 L152,85"
      fill="none"
      stroke="#0891b2"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Glow dot on the highest peak -->
    <circle cx="94" cy="38" r="5.5" fill="#0891b2" opacity="0.3"/>
    <circle cx="94" cy="38" r="2.5" fill="#fafbfc"/>
  </g>
  <g id="wordmark">
    <text x="100" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="22" fill="#0f172a" letter-spacing="-0.5">HypeTest</text>
  </g>
</svg>
